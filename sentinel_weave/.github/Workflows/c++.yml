name: C Lint and Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck build-essential cmake libgmp-dev

      # -----------------------------------------------------------------------
      # cppcheck – C sources (vendor/hqc, vendor/kyber_dilithium, quantaweave)
      #
      # Headers like symmetric.h, parameters.h and reed_solomon.h are NOT
      # missing; they live under vendor/hqc/src/.  The three variants
      # (hqc-1 / hqc-3 / hqc-5) each carry their own parameters.h and
      # reed_solomon.h, so we run one analysis pass per variant.
      # Standard library headers (<stdint.h>, <stdio.h>, etc.) are suppressed
      # via --suppress=missingIncludeSystem – cppcheck does not need them to
      # produce correct results.
      # -----------------------------------------------------------------------
      - name: Run cppcheck on C sources (HQC – per-variant)
        run: |
          set -e
          for VARIANT in hqc-1 hqc-3 hqc-5; do
            echo "=== cppcheck HQC variant: $VARIANT ==="
            cppcheck --enable=all --inconclusive --std=c99 --language=c \
              --suppress=missingIncludeSystem \
              --suppress=missingInclude \
              --suppress=unusedFunction \
              --error-exitcode=1 \
              -I./vendor/hqc/src/common \
              -I./vendor/hqc/src/common/${VARIANT} \
              -I./vendor/hqc/src/ref \
              -I./vendor/hqc/src/ref/${VARIANT} \
              -I./vendor/hqc/lib/fips202 \
              -I./vendor/hqc/packaging/utils/helpers \
              ./vendor/hqc/src/common/ \
              ./vendor/hqc/src/ref/ \
              ./vendor/hqc/lib/fips202/ \
              ./vendor/hqc/packaging/utils/helpers/
          done

      - name: Run cppcheck on C++ sources (kyber_dilithium, quantaweave)
        run: |
          cppcheck --enable=all --inconclusive --std=c++17 --language=c++ \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            -I./vendor/kyber_dilithium/mlkem \
            -I./vendor/kyber_dilithium/mldsa \
            -I./vendor/falcon/include \
            -I. \
            ./vendor/kyber_dilithium/ \
            ./quantaweave/

      - name: Prepare build directory
        run: mkdir -p build/github-testing

      - name: Build (Makefile, CMake, or fallback compilation)
        run: |
          BUILD_DIR=build/github-testing
          if [ -f Makefile ]; then
            echo "Running make..."
            make -j$(nproc) BUILD_DIR=$BUILD_DIR
          elif [ -f CMakeLists.txt ]; then
            echo "Running cmake..."
            cd $BUILD_DIR
            cmake ../..
            make -j$(nproc)
            cd ../..
          else
            echo "No Makefile or CMakeLists.txt found, compiling all C files as a fallback..."
            SRC_FILES=$(find . -type f -name '*.c')
            if [ -n "$SRC_FILES" ]; then
              for SRC in $SRC_FILES; do
                OUT="$BUILD_DIR/$(basename "${SRC%.*}").o"
                gcc -c "$SRC" -o "$OUT" || { echo "Failed to compile $SRC"; exit 1; }
              done
              echo "All C source files compiled."
            else
              echo "No C source files found, skipping build."
            fi
          fi

      - name: Upload built files (download from Actions UI after job)
        uses: actions/upload-artifact@v4
        with:
          name: github-testing-build
          path: build/github-testing/

      - name: List Build Artifacts on Failure
        if: failure()
        run: |
          echo "Listing build directory contents for diagnostics:"
          ls -lR build || true

      - name: Show Last 100 Lines of Build Log (if exists/failed)
        if: failure()
        run: |
          echo "==== BUILD LOG OUTPUT ===="
          tail -n 100 build/*.log || echo "No build logs found."
