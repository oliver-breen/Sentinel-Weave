name: "CodeQL"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [java, javascript, python, c-cpp]
        # Include other languages as necessary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      # Previous steps remain unchanged...

      - name: Set up C/C++ environment
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgmp-dev python3-dev
          
      - name: Install Python dependencies
        if: matrix.language == 'c-cpp'
        run: |
          python -m pip install --upgrade pip setuptools wheel pybind11

      - name: Build C++ extensions
        if: matrix.language == 'c-cpp'
        run: |
          export CFLAGS='-std=c++20'
          export CXXFLAGS='-std=c++20'
          python -m pip install -e .

      # Other steps remain unchanged...