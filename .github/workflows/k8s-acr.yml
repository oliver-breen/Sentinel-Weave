name: k8s-acr

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "Dockerfile"
      - "helm/sentinel-weave/**"
      - "sentinel_weave/worker.py"
      - ".github/workflows/k8s-acr.yml"
  workflow_dispatch:

env:
  IMAGE_NAME_DASHBOARD: sentinel-weave-dashboard
  IMAGE_NAME_WORKER: sentinel-weave-worker
  CHART_PATH: helm/sentinel-weave

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_DASHBOARD }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_DASHBOARD }}:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_WORKER }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_WORKER }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm dependency update $CHART_PATH || true
          helm package $CHART_PATH --destination .

      - name: Push Helm chart to ACR (OCI)
        run: |
          CHART_FILE=$(ls sentinel-weave-*.tgz | head -n 1)
          helm registry login ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
          helm push "$CHART_FILE" oci://${{ secrets.ACR_LOGIN_SERVER }}/helm

      - name: Upload Helm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-weave-helm-package
          path: sentinel-weave-*.tgz

