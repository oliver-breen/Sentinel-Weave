apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel-weave.fullname" . }}
  labels:
    {{- include "sentinel-weave.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "sentinel-weave.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
