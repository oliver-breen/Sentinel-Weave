{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-weave.fullname" . }}-worker
  labels:
    {{- include "sentinel-weave.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel-weave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "sentinel-weave.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sentinel-weave.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.worker.image.repository | default .Values.image.repository }}:{{ .Values.worker.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy | default .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          args:
            {{- toYaml .Values.worker.args | nindent 12 }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if and (not .Values.existingSecret) .Values.azure.storageConnectionString }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel-weave.fullname" . }}-azure
                  key: AZURE_STORAGE_CONNECTION_STRING
                  optional: true
            {{- end }}
            {{- if and (not .Values.existingSecret) .Values.azure.textAnalyticsKey }}
            - name: AZURE_TEXT_ANALYTICS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel-weave.fullname" . }}-azure
                  key: AZURE_TEXT_ANALYTICS_KEY
                  optional: true
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: AZURE_STORAGE_CONNECTION_STRING
                  optional: true
            - name: AZURE_TEXT_ANALYTICS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: AZURE_TEXT_ANALYTICS_ENDPOINT
                  optional: true
            - name: AZURE_TEXT_ANALYTICS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: AZURE_TEXT_ANALYTICS_KEY
                  optional: true
            - name: AZURE_APPINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: AZURE_APPINSIGHTS_CONNECTION_STRING
                  optional: true
            - name: SENTINELWEAVE_AZURE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SENTINELWEAVE_AZURE_ENDPOINT
                  optional: true
            - name: SENTINELWEAVE_AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SENTINELWEAVE_AZURE_API_KEY
                  optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

